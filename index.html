<style>

body {
  font-family: Arial, Helvetica, sans-serif;
  margin: 0;
}

.custom-navbar {
  border-bottom: 2px solid black;
  padding: 15px 20px;
}

.nav-container {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}

.nav-left {
  font-weight: bold;
}

.nav-center {
  display: flex;
  justify-content: center;
  gap: 50px;
}

.nav-center a {
  text-decoration: none;
  color: black;
  font-weight: bold;
  position: relative;
  padding-bottom: 5px;
}

.nav-center a.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 2px;
  background: black;
}

.container {
  max-width: 1000px;
  margin: 30px auto;
  padding: 20px;
}


.section {
  margin-bottom: 40px;
}

.section h3 {
  border-bottom: 2px solid black;
  padding-bottom: 5px;
  margin-bottom: 15px;
}


.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.flip-card {
  background-color: transparent;
  width: 100%;
  aspect-ratio: 1 / 1;
  perspective: 1000px;
}

.flip-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}


.flip-card:hover .flip-card-inner {
  transform: rotateY(180deg);
}


.flip-card-front, .flip-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border: 2px solid black;
  display: flex;
  justify-content: center;
  align-items: center;
}

.flip-card-front {
  background-color: white;
}

.flip-card-back {
  background-color: black;
  color: white;
  transform: rotateY(180deg);
  flex-direction: column;
  text-align: center;
  padding: 10px;
}

.flip-card-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

</style>
</head>
