<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICT 10 Project: Class Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://pyscript.net/releases/2024.9.1/core.css">
<script type="module" src="https://pyscript.net/releases/2024.9.1/core.js"></script>

<style>

body {
  font-family: Arial, Helvetica, sans-serif;
  margin: 0;
}

.custom-navbar {
  border-bottom: 2px solid black;
  padding: 15px 20px;
}

.nav-container {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}

.nav-left {
  font-weight: bold;
}

.nav-center {
  display: flex;
  justify-content: center;
  gap: 50px;
}

.nav-center a {
  text-decoration: none;
  color: black;
  font-weight: bold;
  position: relative;
  padding-bottom: 5px;
}

.nav-center a.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 2px;
  background: black;
}

.container {
  max-width: 1000px;
  margin: 30px auto;
  padding: 20px;
}

.section {
  margin-bottom: 40px;
}

.section h3 {
  border-bottom: 2px solid black;
  padding-bottom: 5px;
  margin-bottom: 15px;
}

.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.flip-card {
  width: 100%;
  aspect-ratio: 1 / 1;
  perspective: 1000px;
}

.flip-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.flip-card:hover .flip-card-inner {
  transform: rotateY(180deg);
}

.flip-card-front, .flip-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 2px solid black;
  display: flex;
  justify-content: center;
  align-items: center;
  backface-visibility: hidden;
}

.flip-card-front {
  background: white;
}

.flip-card-back {
  background: black;
  color: white;
  transform: rotateY(180deg);
  padding: 10px;
  text-align: center;
}

.flip-card-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

</style>
</head>

<body>

<nav class="custom-navbar">
  <div class="nav-container">
    <div class="nav-left">ClassSite</div>

    <div class="nav-center">
      <a href="seatwork.html">Class System</a>
      <a href="index.html" class="active">Class Activities</a>
      <a href="attendance_tracker.html">Attendance</a>
    </div>

    <div></div>
  </div>
</nav>

<div class="container">

  <h2>10-Ruby Class Activities</h2>

  <div class="section">
    <h3>Olmedo</h3>
    <div id="Olmedo-gallery" class="photo-grid"></div>
  </div>

  <div class="section">
    <h3>Baring</h3>
    <div id="Baring-gallery" class="photo-grid"></div>
  </div>

</div>

<py-script src="alt.py"></py-script>

</body>
</html>
