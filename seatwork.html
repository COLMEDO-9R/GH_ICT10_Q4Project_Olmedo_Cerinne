<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ICT 10 Project: Class Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.9.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.9.1/core.js"></script>
    <center>
    <style>
    body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;

            background-image: url('https://i.pinimg.com/736x/30/8f/66/308f66f49f56ba3957be226d6c25117c.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .box {
            background: white;
            width: 1000px;
            max-width: 95%;
            padding: 25px 50px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 100, 0, 0.15);
            text-align: center;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 15px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #a5d6a7;
            background-color:#f1f8f4;
        }

        /* 🔥 BUTTONS */
        .btn-group {
            display: flex;
            gap: 15px;
            width: 90%;
            margin-top: 10px;
        }

        .btn-group button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #43a047;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-group button:hover {
            background: #2e7d32;
        }

        /* 🔥 OUTPUT BOX (SEPARATE) */
        .output-box {
            width: 90%;
            margin-top: 15px;
            padding: 12px;
            background: #f0f6ff;
            border-radius: 12px;
            border: 1px solid #a5d6a7;
            min-height: 40px;

            word-wrap: break-word;
        }

        /* IMAGE */
        #image img {
            display: block;
            margin: 20px auto 10px;
            width: 230px;
            max-width: 100%;
            border: 4px solid #2e7d32;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

    
.custom-navbar {
    background: rgba(232, 240, 234, 0.9); 
    backdrop-filter: blur(10px);
    border-radius: 15px;
    width: 95%;
    box-shadow: 0 5px 15px rgba(100, 120, 100, 0.2);
    padding: 12px 20px;
    max-width: 900px;
    margin: 0 auto 30px auto;
}

/* BRAND */
.navbar-brand {
    font-weight: bold;
    color: #5f7f6b; /* sage text */
    font-size: 1.3rem;
}

/* NAV LINKS */
.nav-link {
    color: #5f7f6b !important;
    font-weight: 500;
    margin: 0 10px;
    padding: 6px 14px;
    border-radius: 12px;
    transition: all 0.3s ease;
}


.nav-link:hover {
    background: #cdddcf;
    color: #3e5c4a !important;
}

.nav-link.active {
    background: #8fae96; 
    color: white;
    font-weight: bold;
}

.navbar-toggler {
    border: none;
    font-size: 1.3rem;
    color: #5f7f6b;
}

/* NAVBAR CONTAINER */
.nav-container {
    display: grid;
    grid-template-columns: 1fr auto 1fr; /* LEFT | CENTER | RIGHT */
    align-items: center;
    width: 100%;
}


.nav-left {
    font-weight: bold;
    color: #5f7f6b;
    padding-left: 15px;
}


.nav-center {
    display: flex;
    justify-content: center;
    gap: 70px;
}

/* LINKS */
.nav-center a {
    text-decoration: none;
    color: #5f7f6b;
    font-weight: bold;
    padding: 20px 10px;
    position: relative;
}


.nav-center a.active::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 100%;
    height: 2px;
    background: #5f7f6b;
}
    </style>
</head>
<!-- NAVBAR -->
<nav class="custom-navbar">
  <div class="nav-container">

    <!-- LEFT -->
    <div class="nav-left">
      🍃 ClassSite
    </div>

    <!-- CENTER -->
    <div class="nav-center">
      <a href="seatwork.html">Class System</a>
      <a href="index.html" class="active">Class Activites</a>
      <a href="attendance_tracker.html">Attendance</a>
    </div>

    <!-- RIGHT (empty, just for balance) -->
    <div></div>

  </div>
</nav>

<body>

    <div class="box">
        <h2>Grade 10 Classmate System</h2>

        <input type="text" id="name" placeholder="Enter Name">
        <input type="text" id="section" placeholder="Enter Section">
        <input type="text" id="subject" placeholder="Favorite Subject">

        
        <div class="btn-group">
            <button py-click="show_list">Show List</button>
            <button py-click="add_classmate">Add Classmate</button>
        </div>

        <div class="output-box" id="output"></div>
        <div id="image">
            <img src="https://i.pinimg.com/1200x/5e/17/d0/5e17d09d26f477c08755907890032884.jpg" alt="Image">
        </div>
    </div>

    <py-script src="main.py"></py-script>
    </center>

</body>
</html>
