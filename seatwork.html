<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ICT 10 - Account Creation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.9.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.9.1/core.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

            /* Background image */
            background-image: url('https://i.pinimg.com/736x/4b/ed/7d/4bed7d3ba67c2a36903aafe56cebbd4f.jpg');
            background-size: cover;       /* Make it cover the entire screen */
            background-position: center;  /* Center the image */
            background-repeat: no-repeat; /* Avoid repeating */
            background-attachment: fixed; /* Makes the background stay in place when scrolling */
        }

        .box {
            background: #ffffff;
            width: 380px;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 100, 0, 0.15);
            text-align: center;
            transition: 0.3s ease;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 10px;
            border: 1px solid #a5d6a7;
            background-color: #f1f8f4;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border: 1px solid #43a047;
            box-shadow: 0 0 8px rgba(67, 160, 71, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            background: #43a047;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2e7d32;
        }

        #output {
            margin-top: 18px;
            font-weight: bold;
            color: #1b5e20;
        }

         #image img {
        margin-top: 20px;
        width: 80%;
        border: 4px solid #2e7d32;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        transition: transform 0.3s;
         }

        #image img:hover {
        transform: scale(1.05);
         }
    </style>
</head>

<body>

    <div class="box">
        <h2>Grade 10 Classmate System</h2>

        <input type="text" id="name" placeholder="Enter Name">
        <input type="text" id="section" placeholder="Enter Section">
        <input type="text" id="subject" placeholder="Favorite Subject">

        
        <div class="btn-group">
            <button py-click="show_list">Show List</button>
            <button py-click="add_classmate">Add Classmate</button>
        </div>

        <div class="output-box" id="output"></div>
        <div id="image">
            <img src="https://i.pinimg.com/736x/bc/9a/f0/bc9af032fa4daecc74d4a62ba4b956b7.jpg" alt="Image">
        </div>
    </div>

    <py-script src="main.py"></py-script>

</body>
</html>
